<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>RentApp - Objetos</title>

    <link rel="stylesheet" href="css/style.css">

</head>
<body>

    <div class="contenedor">

        <div class="logo">

            <h1>RentApp</h1>

            <p>Explora objetos disponibles para renta</p>

        </div>

        <hr>

        <h2>Objetos disponibles</h2>

        <p id="infoUsuario"></p>

        <div class="card">

            <h3>Buscar y filtrar</h3>

            <input
                type="text"
                id="busqueda"
                placeholder="Buscar objeto">

            <select id="categoria">

                <option value="">Todas las categorias</option>

                <option value="Herramientas">
                    Herramientas
                </option>

                <option value="Electrodomesticos">
                    Electrodomesticos
                </option>

                <option value="Jardin">
                    Jardin
                </option>

                <option value="Electronica">
                    Electronica
                </option>

                <option value="Vehiculos">
                    Vehiculos
                </option>

            </select>

            <input
                type="number"
                id="precio"
                placeholder="Precio maximo">

            <button onclick="cargarObjetos()">
                Buscar
            </button>

            <button onclick="limpiarFiltros()">
                Mostrar todos
            </button>

        </div>

        <button onclick="volver()">
            Volver
        </button>

        <hr>

        <div id="listaObjetos"></div>

    </div>

    <script src="js/objetos.js"></script>

</body>
</html>
