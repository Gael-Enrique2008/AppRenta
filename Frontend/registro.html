<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>RentApp - Registro</title>

    <link rel="stylesheet" href="css/style.css">

</head>
<body>

    <div class="contenedor">

        <div class="logo">

            <h1>RentApp</h1>

            <p>Plataforma de renta de objetos</p>

        </div>

        <hr>

        <h2>Crear cuenta</h2>

        <input
            type="text"
            id="nombre"
            placeholder="Nombre completo">

        <input
            type="email"
            id="correo"
            placeholder="Correo electronico">

        <input
            type="password"
            id="password"
            placeholder="Contraseña">

        <select id="rol">

            <option value="arrendatario">
                Arrendatario
            </option>

            <option value="propietario">
                Propietario
            </option>

        </select>

        <div class="legal">

            <input
                type="checkbox"
                id="acepto">

            <label for="acepto">

                Acepto los

                <a href="terminos.html" target="_blank">
                    Terminos y Condiciones
                </a>

            </label>

        </div>

        <div class="legal-link">

            <a href="aviso.html" target="_blank">
                Ver Aviso de Privacidad
            </a>

        </div>

        <button onclick="registrar()">
            Registrarse
        </button>

        <div class="enlace">

            <p>¿Ya tienes cuenta?</p>

            <a href="login.html">
                Iniciar sesion
            </a>

        </div>

    </div>

    <script src="js/registro.js"></script>

</body>
</html>
