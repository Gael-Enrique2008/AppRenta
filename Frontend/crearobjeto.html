<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Publicar objeto</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="contenedor">

        <h2>Publicar objeto</h2>

        <input type="text" id="titulo" placeholder="Titulo">

        <textarea id="descripcion" placeholder="Descripcion"></textarea>

        <select id="categoria">

            <option value="Herramientas">
                Herramientas
            </option>

            <option value="Electrodomesticos">
                Electrodomesticos
            </option>

            <option value="Jardin">
                Jardin
            </option>

            <option value="Electronica">
                Electronica
            </option>

            <option value="Vehiculos">
                Vehiculos
            </option>

        </select>

        <textarea id="restricciones" placeholder="Restricciones"></textarea>

        <input type="number" id="precio_dia" placeholder="Precio por dia">

        <input type="number" id="precio_semana" placeholder="Precio por semana">

        <input type="number" id="precio_mes" placeholder="Precio por mes">

        <button onclick="crearObjeto()">
            Publicar objeto
        </button>

        <a href="objetos.html">Ver objetos</a>

    </div>

    <script src="js/crearobjeto.js"></script>

</body>
</html>
