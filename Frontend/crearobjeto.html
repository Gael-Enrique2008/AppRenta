<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>RentApp - Publicar objeto</title>

    <link rel="stylesheet" href="css/style.css">

</head>
<body>

    <div class="contenedor">

        <div class="logo">

            <h1>RentApp</h1>

            <p>Publica un objeto para renta</p>

        </div>

        <hr>

        <h2>Nuevo objeto</h2>

        <div class="card">

            <input
                type="text"
                id="titulo"
                placeholder="Titulo del objeto">

            <textarea
                id="descripcion"
                placeholder="Descripcion del objeto"></textarea>

            <select id="categoria">

                <option value="Herramientas">
                    Herramientas
                </option>

                <option value="Electrodomesticos">
                    Electrodomesticos
                </option>

                <option value="Jardin">
                    Jardin
                </option>

                <option value="Electronica">
                    Electronica
                </option>

                <option value="Vehiculos">
                    Vehiculos
                </option>

            </select>

            <textarea
                id="restricciones"
                placeholder="Restricciones y condiciones de uso"></textarea>

        </div>

        <div class="card">

            <h3>Tarifas</h3>

            <input
                type="number"
                id="precio_dia"
                placeholder="Precio por dia">

            <input
                type="number"
                id="precio_semana"
                placeholder="Precio por semana">

            <input
                type="number"
                id="precio_mes"
                placeholder="Precio por mes">

        </div>

        <button onclick="crearObjeto()">
            Publicar objeto
        </button>

        <button onclick="window.location.href='objetos.html'">
            Ver objetos
        </button>

    </div>

    <script src="js/crearobjeto.js"></script>

</body>
</html>
